@let extendedPictures = extendedPictures$ | async;
@for (extendedPicture of extendedPictures; track extendedPicture.picture.id) {
<app-picture
  [picture]="extendedPicture.picture"
  [visible]="extendedPicture.visible"
  (displayed)="onDisplayed($event)"
  (loaded)="onLoaded($event)">
</app-picture>
}
